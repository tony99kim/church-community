services:
  - type: web
    name: church-hub-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        sync: false          # Render 대시보드에서 직접 입력
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true  # Render가 자동으로 안전한 값 생성
      - key: JWT_ACCESS_EXPIRY
        value: "900000"
      - key: JWT_REFRESH_EXPIRY
        value: "604800000"
      - key: CORS_ALLOWED_ORIGINS
        sync: false          # 배포 후 Vercel URL 입력
