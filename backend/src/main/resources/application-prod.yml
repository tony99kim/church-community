spring:
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        prepareThreshold: 0
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      ssl:
        enabled: true

supabase:
  url: ${SUPABASE_URL:https://mcdtxlcsbcxupzmkzjqd.supabase.co}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
  bucket: church-community

logging:
  level:
    com.churchhub: WARN
